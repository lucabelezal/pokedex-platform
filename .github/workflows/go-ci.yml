name: CI Go (Build, Test, Lint)

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches:
      - main
      - develop

jobs:
  go-ci:
    name: Go CI - ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: core/app/pokemon-catalog-service
            artifact_name: coverage-app-pokemon-catalog-service
          - module: core/bff/mobile-bff
            artifact_name: coverage-bff-mobile-bff
          - module: core/infra/postgres/json2sql
            artifact_name: coverage-infra-postgres-json2sql

    defaults:
      run:
        working-directory: ${{ matrix.module }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.mod

      - name: Go mod tidy check
        shell: bash
        run: |
          go mod tidy
          git diff --exit-code -- go.mod
          if [[ -f go.sum ]]; then
            git diff --exit-code -- go.sum
          fi

      - name: Go fmt check
        shell: bash
        run: |
          fmt_out="$(gofmt -l .)"
          if [[ -n "$fmt_out" ]]; then
            echo "Arquivos fora do gofmt:" 
            echo "$fmt_out"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.module }}/coverage.out
          if-no-files-found: ignore

  golangci-lint:
    name: GolangCI-Lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - core/app/pokemon-catalog-service
          - core/bff/mobile-bff
          - core/infra/postgres/json2sql

    defaults:
      run:
        working-directory: ${{ matrix.module }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.mod

      - name: Instalar golangci-lint
        shell: bash
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        shell: bash
        run: |
          "$(go env GOPATH)/bin/golangci-lint" run --timeout=5m
