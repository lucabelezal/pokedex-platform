services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pokedex_dev_db}
      POSTGRES_USER: ${POSTGRES_USER:-pokedex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pokedex}
    ports:
      - "5434:5432"
    volumes:
      - ./infra/postgres/schema/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./infra/postgres/seeds/init-data.sql:/docker-entrypoint-initdb.d/02_init-data.sql:ro
      - ./infra/postgres/seeds/screen-pokedex-sample.sql:/docker-entrypoint-initdb.d/03_screen-pokedex-sample.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pokedex} -d ${POSTGRES_DB:-pokedex_dev_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pokemon-catalog-service:
    build:
      context: ./app/pokemon-catalog-service
      dockerfile: Dockerfile
    environment:
      POKEMON_CATALOG_SERVICE_PORT: ${POKEMON_CATALOG_SERVICE_PORT:-8081}
      DATABASE_URL: ${DATABASE_URL:-postgres://pokedex:pokedex@postgres:5432/pokedex_dev_db?sslmode=disable}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./app/auth-service
      dockerfile: Dockerfile
    environment:
      AUTH_SERVICE_PORT: ${AUTH_SERVICE_PORT:-8082}
      DATABASE_URL: ${DATABASE_URL:-postgres://pokedex:pokedex@postgres:5432/pokedex_dev_db?sslmode=disable}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET obrigatoria}
      REFRESH_TOKEN_TTL_HOURS: ${REFRESH_TOKEN_TTL_HOURS:-168}
      AUTH_CLEANUP_INTERVAL_MINS: ${AUTH_CLEANUP_INTERVAL_MINS:-30}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mobile-bff:
    build:
      context: ./bff/mobile-bff
      dockerfile: Dockerfile
    environment:
      MOBILE_BFF_PORT: ${MOBILE_BFF_PORT:-8080}
      POKEMON_CATALOG_SERVICE_URL: ${POKEMON_CATALOG_SERVICE_URL:-http://pokemon-catalog-service:8081}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8082}
      DATABASE_URL: ${DATABASE_URL:-postgres://pokedex:pokedex@postgres:5432/pokedex_dev_db?sslmode=disable}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET obrigatoria}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:8000}
      AUTH_RATE_LIMIT_REQUESTS: ${AUTH_RATE_LIMIT_REQUESTS:-20}
      AUTH_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:-60}
    depends_on:
      pokemon-catalog-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  kong:
    image: kong:3.7
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /opt/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./gateway/kong/kong.yml:/opt/kong/kong.yml:ro
    depends_on:
      mobile-bff:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
