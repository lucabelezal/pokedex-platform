info:
  name: signup
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/v1/auth/signup"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "seu-email@exemplo.com",
        "password": "SuaSenha123!"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const token = res?.body?.access_token || res?.body?.accessToken;
        if (token) {
          bru.setVar("authToken", token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
