info:
  name: refresh
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/v1/auth/refresh"
  headers:
    - name: Authorization
      value: "Bearer {{authToken}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const token = res?.body?.access_token || res?.body?.accessToken;
        if (token) {
          bru.setVar("authToken", token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
